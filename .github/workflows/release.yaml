name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-typescript:
    name: Release TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: packages/sdk-python/.python-version

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          working-directory: packages/sdk-python
          enable-cache: true
          cache-dependency-glob: packages/sdk-python/uv.lock

      - uses: extractions/setup-just@v3

      - run: just install
      - run: just check
      - run: just build

      - name: Create release pull request or publish TypeScript
        id: changesets
        uses: changesets/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: just version
          publish: just _publish-typescript
          title: Release Stagehand packages
          commit: release Stagehand packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish TypeScript canary
        if: steps.changesets.outputs.published != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout "$GITHUB_SHA"
          just _publish-typescript-canary "$GITHUB_SHA"

  python-release-status:
    name: Check Python release status
    needs: release-typescript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should-publish: ${{ steps.status.outputs.should-publish }}
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - name: Check PyPI
        id: status
        run: echo "should-publish=$(vp exec tsx scripts/release/python-publish-status.ts)" >> "$GITHUB_OUTPUT"

  publish-python:
    name: Release Python SDK
    needs: python-release-status
    if: needs.python-release-status.outputs.should-publish == 'true'
    uses: ./.github/workflows/publish-python.yaml
    secrets: inherit
