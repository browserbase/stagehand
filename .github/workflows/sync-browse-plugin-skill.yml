name: Sync browse skill to browse-plugin

# PROPOSAL — not yet functional. Requires a BROWSE_PLUGIN_SYNC_TOKEN secret
# (GitHub App installation token scoped to browserbase/browse-plugin contents+PRs,
# or an org-SSO-authorized fine-grained PAT) to be provisioned before this can run.
# See scripts/sync-browse-plugin-skill.sh for the diff+copy logic, unit-tested
# separately against real local checkouts.

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/skills/browse/SKILL.md"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stagehand
        uses: actions/checkout@v4
        with:
          path: stagehand

      - name: Checkout browse-plugin
        uses: actions/checkout@v4
        with:
          repository: browserbase/browse-plugin
          token: ${{ secrets.BROWSE_PLUGIN_SYNC_TOKEN }}
          path: browse-plugin

      - name: Diff and copy canonical skill
        id: sync
        env:
          STAGEHAND_DIR: ${{ github.workspace }}/stagehand
          BROWSE_PLUGIN_DIR: ${{ github.workspace }}/browse-plugin
        run: |
          CHANGED=$(stagehand/scripts/sync-browse-plugin-skill.sh | tee /dev/stderr | cut -d= -f2)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Open sync PR
        if: steps.sync.outputs.changed == 'true'
        working-directory: browse-plugin
        env:
          GH_TOKEN: ${{ secrets.BROWSE_PLUGIN_SYNC_TOKEN }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          BRANCH="sync-browse-skill-${SHORT_SHA:0:7}"
          git checkout -b "$BRANCH"
          git config user.name "browserbase-bot"
          git config user.email "bot@browserbase.com"
          git add skills/browse/SKILL.md
          git commit -m "sync: update browse skill from stagehand@${SHORT_SHA:0:7}"
          git push origin "$BRANCH"
          gh pr create --repo browserbase/browse-plugin \
            --title "sync: update browse skill (stagehand@${SHORT_SHA:0:7})" \
            --body "Automated sync of \`skills/browse/SKILL.md\` from [browserbase/stagehand@${SHORT_SHA:0:7}](https://github.com/browserbase/stagehand/commit/${SHORT_SHA}). Review the diff before merging — nothing here auto-merges." \
            --base main --head "$BRANCH"
