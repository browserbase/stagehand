name: Stagehand Server SEA Build

on:
  workflow_call:
    inputs:
      matrix:
        description: "JSON matrix include list for SEA binaries."
        required: false
        type: string
        default: |
          [
            {"os":"ubuntu-latest","platform":"linux","arch":"x64","binary_name":"stagehand-server-linux-x64"},
            {"os":"ubuntu-latest","platform":"linux","arch":"arm64","binary_name":"stagehand-server-linux-arm64"},
            {"os":"macos-15","platform":"darwin","arch":"arm64","binary_name":"stagehand-server-darwin-arm64"},
            {"os":"macos-15-intel","platform":"darwin","arch":"x64","binary_name":"stagehand-server-darwin-x64"},
            {"os":"windows-latest","platform":"win32","arch":"x64","binary_name":"stagehand-server-win32-x64.exe"},
            {"os":"windows-latest","platform":"win32","arch":"arm64","binary_name":"stagehand-server-win32-arm64.exe"}
          ]
      use-prebuilt-artifacts:
        description: "Whether to download pre-built package artifacts."
        required: false
        type: string
        default: "false"
      restore-turbo-cache:
        description: "Whether to restore local .turbo cache."
        required: false
        type: string
        default: "true"
      node-version:
        description: "Node.js version for setup."
        required: false
        type: string
        default: "20.x"
      upload-only-binary:
        description: "Upload only this binary (empty => upload all)."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      matrix:
        description: "JSON matrix include list for SEA binaries."
        required: false
        default: |
          [
            {"os":"ubuntu-latest","platform":"linux","arch":"x64","binary_name":"stagehand-server-linux-x64"},
            {"os":"ubuntu-latest","platform":"linux","arch":"arm64","binary_name":"stagehand-server-linux-arm64"},
            {"os":"macos-15","platform":"darwin","arch":"arm64","binary_name":"stagehand-server-darwin-arm64"},
            {"os":"macos-15-intel","platform":"darwin","arch":"x64","binary_name":"stagehand-server-darwin-x64"},
            {"os":"windows-latest","platform":"win32","arch":"x64","binary_name":"stagehand-server-win32-x64.exe"},
            {"os":"windows-latest","platform":"win32","arch":"arm64","binary_name":"stagehand-server-win32-arm64.exe"}
          ]
      use-prebuilt-artifacts:
        description: "Whether to download pre-built package artifacts."
        required: false
        type: string
        default: "false"
      restore-turbo-cache:
        description: "Whether to restore local .turbo cache."
        required: false
        type: string
        default: "true"
      node-version:
        description: "Node.js version for setup."
        required: false
        type: string
        default: "20.x"
      upload-only-binary:
        description: "Upload only this binary (empty => upload all)."
        required: false
        type: string
        default: ""

jobs:
  build_binaries:
    name: Build SEA binaries (${{ matrix.binary_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: false

      - uses: ./.github/actions/setup-node-pnpm-turbo
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_DOWNLOAD: "1"
          PUPPETEER_SKIP_DOWNLOAD: "1"
        with:
          use-prebuilt-artifacts: ${{ inputs.use-prebuilt-artifacts }}
          restore-turbo-cache: ${{ inputs.restore-turbo-cache }}
          node-version: ${{ inputs.node-version }}

      - name: Build SEA binary (ESM)
        shell: bash
        env:
          SEA_TARGET_PLATFORM: ${{ matrix.platform }}
          SEA_TARGET_ARCH: ${{ matrix.arch }}
          SEA_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          set -euo pipefail
          TURBO_ONLY=""
          if [ "${{ inputs.use-prebuilt-artifacts }}" = "true" ]; then
            TURBO_ONLY="--only"
          fi
          pnpm exec turbo run build:sea:esm --filter=@browserbasehq/stagehand-server ${TURBO_ONLY}

      - name: Verify SEA binary exists
        shell: bash
        run: |
          test -f "packages/server/dist/sea/${{ matrix.binary_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: inputs.upload-only-binary == '' || matrix.binary_name == inputs.upload-only-binary
        with:
          name: ${{ matrix.binary_name }}
          # package.json is included to anchor artifact paths at repo root.
          path: |
            package.json
            packages/server/dist/sea/${{ matrix.binary_name }}
          retention-days: 7
