openapi: "3.1.0"
info:
  title: Stagehand API v4
  version: "4.0.0"
  description: >-
    Stagehand SDK for AI browser automation [ALPHA]. This API allows clients to

    execute browser automation tasks remotely on the Browserbase cloud.

    Create a browser session with /browsersession, then use that id with page
    routes.

    Responses are streamed using Server-Sent Events (SSE) when the

    `x-stream-response: true` header is provided.


    This SDK is currently ALPHA software and is not production ready!

    Please try it and give us your feedback, stay tuned for upcoming release
    announcements!
  contact:
    name: Browserbase
    url: https://browserbase.com
components:
  securitySchemes:
    BrowserbaseApiKey:
      type: apiKey
      in: header
      name: x-bb-api-key
      description: Browserbase API key for authentication
    BrowserbaseProjectId:
      type: apiKey
      in: header
      name: x-bb-project-id
      description: Browserbase project ID
    ModelApiKey:
      type: apiKey
      in: header
      name: x-model-api-key
      description: API key for the AI model provider (OpenAI, Anthropic, etc.)
  links:
    SessionAct:
      operationId: SessionAct
      parameters:
        id: $response.body#/data/sessionId
      description: Perform an action on the session
    SessionExtract:
      operationId: SessionExtract
      parameters:
        id: $response.body#/data/sessionId
      description: Extract data from the session
    SessionObserve:
      operationId: SessionObserve
      parameters:
        id: $response.body#/data/sessionId
      description: Observe available actions on the session
    SessionNavigate:
      operationId: SessionNavigate
      parameters:
        id: $response.body#/data/sessionId
      description: Navigate to a URL in the session
    SessionAgentExecute:
      operationId: SessionAgentExecute
      parameters:
        id: $response.body#/data/sessionId
      description: Execute an agent on the session
    SessionReplay:
      operationId: SessionReplay
      parameters:
        id: $response.body#/data/sessionId
      description: Replay session metrics
    SessionEnd:
      operationId: SessionEnd
      parameters:
        id: $response.body#/data/sessionId
      description: End the session and release resources
  schemas:
    BrowserSessionLocalCreateRequest:
      type: object
      properties:
        modelName:
          description: Model name to use for AI operations
          example: openai/gpt-4.1-nano
          type: string
        domSettleTimeoutMs:
          type: number
        verbose:
          anyOf:
            - type: number
              const: 0
            - type: number
              const: 1
            - type: number
              const: 2
        systemPrompt:
          type: string
        selfHeal:
          type: boolean
        waitForCaptchaSolves:
          type: boolean
        experimental:
          type: boolean
        actTimeoutMs:
          type: number
        env:
          type: string
          const: LOCAL
        cdpUrl:
          type: string
        localBrowserLaunchOptions:
          $ref: "#/components/schemas/LocalBrowserLaunchOptions"
      required:
        - modelName
        - env
      additionalProperties: false
    BrowserSessionBrowserbaseCreateRequest:
      type: object
      properties:
        modelName:
          description: Model name to use for AI operations
          example: openai/gpt-4.1-nano
          type: string
        domSettleTimeoutMs:
          type: number
        verbose:
          anyOf:
            - type: number
              const: 0
            - type: number
              const: 1
            - type: number
              const: 2
        systemPrompt:
          type: string
        selfHeal:
          type: boolean
        waitForCaptchaSolves:
          type: boolean
        experimental:
          type: boolean
        actTimeoutMs:
          type: number
        env:
          type: string
          const: BROWSERBASE
        browserbaseSessionId:
          type: string
        browserbaseSessionCreateParams:
          $ref: "#/components/schemas/BrowserbaseSessionCreateParams"
      required:
        - modelName
        - env
      additionalProperties: false
    BrowserbaseBrowserSettings:
      type: object
      properties:
        advancedStealth:
          type: boolean
        blockAds:
          type: boolean
        context:
          $ref: "#/components/schemas/BrowserbaseContext"
        extensionId:
          type: string
        fingerprint:
          $ref: "#/components/schemas/BrowserbaseFingerprint"
        logSession:
          type: boolean
        recordSession:
          type: boolean
        solveCaptchas:
          type: boolean
        viewport:
          $ref: "#/components/schemas/BrowserbaseViewport"
    BrowserbaseContext:
      type: object
      properties:
        id:
          type: string
        persist:
          type: boolean
      required:
        - id
    BrowserbaseFingerprint:
      type: object
      properties:
        browsers:
          type: array
          items:
            type: string
            enum:
              - chrome
              - edge
              - firefox
              - safari
        devices:
          type: array
          items:
            type: string
            enum:
              - desktop
              - mobile
        httpVersion:
          type: string
          enum:
            - "1"
            - "2"
        locales:
          type: array
          items:
            type: string
        operatingSystems:
          type: array
          items:
            type: string
            enum:
              - android
              - ios
              - linux
              - macos
              - windows
        screen:
          $ref: "#/components/schemas/BrowserbaseFingerprintScreen"
    BrowserbaseFingerprintScreen:
      type: object
      properties:
        maxHeight:
          type: number
        maxWidth:
          type: number
        minHeight:
          type: number
        minWidth:
          type: number
    BrowserbaseViewport:
      type: object
      properties:
        width:
          type: number
        height:
          type: number
    ProxyConfig:
      oneOf:
        - $ref: "#/components/schemas/BrowserbaseProxyConfig"
        - $ref: "#/components/schemas/ExternalProxyConfig"
      type: object
      discriminator:
        propertyName: type
        mapping:
          browserbase: "#/components/schemas/BrowserbaseProxyConfig"
          external: "#/components/schemas/ExternalProxyConfig"
    BrowserbaseProxyConfig:
      type: object
      properties:
        type:
          type: string
          const: browserbase
        domainPattern:
          type: string
        geolocation:
          $ref: "#/components/schemas/BrowserbaseProxyGeolocation"
      required:
        - type
    BrowserbaseProxyGeolocation:
      type: object
      properties:
        country:
          type: string
        city:
          type: string
        state:
          type: string
      required:
        - country
    ExternalProxyConfig:
      type: object
      properties:
        type:
          type: string
          const: external
        server:
          type: string
        domainPattern:
          type: string
        username:
          type: string
        password:
          type: string
      required:
        - type
        - server
    BrowserbaseRegion:
      type: string
      enum:
        - us-west-2
        - us-east-1
        - eu-central-1
        - ap-southeast-1
    PageClickSelectorParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        selector:
          $ref: "#/components/schemas/PageSelector"
        button:
          $ref: "#/components/schemas/MouseButton"
        clickCount:
          type: integer
          minimum: 1
          maximum: 9007199254740991
      required:
        - selector
      additionalProperties: false
    PageClickCoordinatesParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        x:
          type: number
        y:
          type: number
        button:
          $ref: "#/components/schemas/MouseButton"
        clickCount:
          type: integer
          minimum: 1
          maximum: 9007199254740991
      required:
        - x
        - y
      additionalProperties: false
    PageHoverSelectorParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        selector:
          $ref: "#/components/schemas/PageSelector"
      required:
        - selector
      additionalProperties: false
    PageHoverCoordinatesParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        x:
          type: number
        y:
          type: number
      required:
        - x
        - y
      additionalProperties: false
    PageScrollSelectorParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        selector:
          $ref: "#/components/schemas/PageSelector"
        percentage:
          type: number
          minimum: 0
          maximum: 100
      required:
        - selector
        - percentage
      additionalProperties: false
    PageScrollCoordinatesParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        x:
          type: number
        y:
          type: number
        deltaX:
          type: number
        deltaY:
          type: number
      required:
        - x
        - y
        - deltaY
      additionalProperties: false
    PageDragAndDropSelectorParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        from:
          $ref: "#/components/schemas/PageSelector"
        to:
          $ref: "#/components/schemas/PageSelector"
        button:
          $ref: "#/components/schemas/MouseButton"
        steps:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        delay:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - from
        - to
      additionalProperties: false
    PageDragAndDropCoordinatesParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        from:
          $ref: "#/components/schemas/PagePoint"
        to:
          $ref: "#/components/schemas/PagePoint"
        button:
          $ref: "#/components/schemas/MouseButton"
        steps:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        delay:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - from
        - to
      additionalProperties: false
    SessionHeaders:
      type: object
      properties:
        x-stream-response:
          description: Whether to stream the response via SSE
          example: "true"
          type: string
          enum:
            - "true"
            - "false"
    PageXPathResult:
      type: object
      properties:
        xpath:
          type: string
      additionalProperties: false
    PageDragAndDropResult:
      type: object
      properties:
        fromXpath:
          type: string
        toXpath:
          type: string
      additionalProperties: false
    PageTypeResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text
      additionalProperties: false
    PageKeyPressResult:
      type: object
      properties:
        key:
          type: string
      required:
        - key
      additionalProperties: false
    PageEnableCursorOverlayResult:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled
      additionalProperties: false
    PageAddInitScriptResult:
      type: object
      properties:
        added:
          type: boolean
      required:
        - added
      additionalProperties: false
    PageNavigationResult:
      type: object
      properties:
        url:
          type: string
        response:
          anyOf:
            - type: object
              properties:
                url:
                  type: string
                status:
                  type: integer
                  minimum: -9007199254740991
                  maximum: 9007199254740991
                statusText:
                  type: string
                ok:
                  type: boolean
                headers:
                  $ref: "#/components/schemas/PageHeaders"
              required:
                - url
                - status
                - statusText
                - ok
                - headers
              additionalProperties: false
            - type: "null"
      required:
        - url
        - response
      additionalProperties: false
    PageTargetIdResult:
      type: object
      properties:
        targetId:
          $ref: "#/components/schemas/PageId"
      required:
        - targetId
      additionalProperties: false
    PageMainFrameIdResult:
      type: object
      properties:
        mainFrameId:
          $ref: "#/components/schemas/FrameId"
      required:
        - mainFrameId
      additionalProperties: false
    PageMainFrameResult:
      type: object
      properties:
        frame:
          $ref: "#/components/schemas/PageFrame"
      required:
        - frame
      additionalProperties: false
    PageFrame:
      type: object
      properties:
        frameId:
          $ref: "#/components/schemas/FrameId"
        pageId:
          $ref: "#/components/schemas/PageId"
        sessionId:
          anyOf:
            - $ref: "#/components/schemas/CDPSessionId"
            - type: "null"
        isBrowserRemote:
          type: boolean
      required:
        - frameId
        - pageId
        - sessionId
        - isBrowserRemote
      additionalProperties: false
    PageFrameTreeResult:
      type: object
      properties:
        frameTree: {}
      required:
        - frameTree
      additionalProperties: false
    PageListAllFrameIdsResult:
      type: object
      properties:
        frameIds:
          type: array
          items:
            $ref: "#/components/schemas/FrameId"
      required:
        - frameIds
      additionalProperties: false
    PageGetOrdinalResult:
      type: object
      properties:
        frameId:
          $ref: "#/components/schemas/FrameId"
        ordinal:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - frameId
        - ordinal
      additionalProperties: false
    PageTitleResult:
      type: object
      properties:
        title:
          type: string
      required:
        - title
      additionalProperties: false
    PageUrlResult:
      type: object
      properties:
        url:
          type: string
      required:
        - url
      additionalProperties: false
    PageScreenshotResult:
      type: object
      properties:
        base64:
          type: string
        mimeType:
          $ref: "#/components/schemas/ScreenshotMimeType"
      required:
        - base64
        - mimeType
      additionalProperties: false
    PageSnapshotResult:
      type: object
      properties:
        formattedTree:
          type: string
        xpathMap:
          type: object
          properties: {}
          additionalProperties:
            type: string
        urlMap:
          type: object
          properties: {}
          additionalProperties:
            type: string
      required:
        - formattedTree
        - xpathMap
        - urlMap
      additionalProperties: false
    PageFramesResult:
      type: object
      properties:
        frames:
          type: array
          items:
            $ref: "#/components/schemas/PageFrame"
      required:
        - frames
      additionalProperties: false
    PageSetViewportSizeResult:
      type: object
      properties:
        width:
          type: number
          exclusiveMinimum: 0
        height:
          type: number
          exclusiveMinimum: 0
        deviceScaleFactor:
          type: number
          exclusiveMinimum: 0
      required:
        - width
        - height
      additionalProperties: false
    PageSetExtraHTTPHeadersResult:
      type: object
      properties:
        headers:
          $ref: "#/components/schemas/PageHeaders"
      required:
        - headers
      additionalProperties: false
    PageWaitForLoadStateResult:
      type: object
      properties:
        state:
          $ref: "#/components/schemas/LoadState"
      required:
        - state
      additionalProperties: false
    PageWaitForSelectorResult:
      type: object
      properties:
        selector:
          $ref: "#/components/schemas/PageSelector"
        matched:
          type: boolean
      required:
        - selector
        - matched
      additionalProperties: false
    PageWaitForTimeoutResult:
      type: object
      properties:
        ms:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - ms
      additionalProperties: false
    PageEvaluateResult:
      type: object
      properties:
        value: {}
      required:
        - value
      additionalProperties: false
    PageSendCDPResult:
      type: object
      properties:
        value: {}
      required:
        - value
      additionalProperties: false
    PageCloseResult:
      type: object
      properties:
        closed:
          type: boolean
      required:
        - closed
      additionalProperties: false
    LocalBrowserLaunchOptions:
      type: object
      properties:
        args:
          type: array
          items:
            type: string
        executablePath:
          type: string
        port:
          type: number
        userDataDir:
          type: string
        preserveUserDataDir:
          type: boolean
        headless:
          type: boolean
        devtools:
          type: boolean
        chromiumSandbox:
          type: boolean
        ignoreDefaultArgs:
          anyOf:
            - type: boolean
            - type: array
              items:
                type: string
        proxy:
          type: object
          properties:
            server:
              type: string
            bypass:
              type: string
            username:
              type: string
            password:
              type: string
          required:
            - server
        locale:
          type: string
        viewport:
          type: object
          properties:
            width:
              type: number
            height:
              type: number
          required:
            - width
            - height
        deviceScaleFactor:
          type: number
        hasTouch:
          type: boolean
        ignoreHTTPSErrors:
          type: boolean
        cdpUrl:
          type: string
        cdpHeaders:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: string
        connectTimeoutMs:
          type: number
        downloadsPath:
          type: string
        acceptDownloads:
          type: boolean
      additionalProperties: false
    BrowserbaseSessionCreateParams:
      type: object
      properties:
        projectId:
          type: string
        browserSettings:
          $ref: "#/components/schemas/BrowserbaseBrowserSettings"
        extensionId:
          type: string
        keepAlive:
          type: boolean
        proxies:
          anyOf:
            - type: boolean
            - type: array
              items:
                $ref: "#/components/schemas/ProxyConfig"
        region:
          $ref: "#/components/schemas/BrowserbaseRegion"
        timeout:
          type: number
        userMetadata:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
    BrowserSessionId:
      example: session_01JXAMPLE
      type: string
      minLength: 1
    BrowserSessionEnv:
      type: string
      enum:
        - LOCAL
        - BROWSERBASE
    BrowserSessionStatus:
      type: string
      enum:
        - running
        - ended
    BrowserSessionCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/BrowserSessionLocalCreateRequest"
        - $ref: "#/components/schemas/BrowserSessionBrowserbaseCreateRequest"
      type: object
      discriminator:
        propertyName: env
        mapping:
          LOCAL: "#/components/schemas/BrowserSessionLocalCreateRequest"
          BROWSERBASE: "#/components/schemas/BrowserSessionBrowserbaseCreateRequest"
    BrowserSessionEndRequest:
      type: object
      properties: {}
      additionalProperties: false
    BrowserSession:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/BrowserSessionId"
        env:
          $ref: "#/components/schemas/BrowserSessionEnv"
        status:
          $ref: "#/components/schemas/BrowserSessionStatus"
        modelName:
          type: string
        cdpUrl:
          anyOf:
            - type: string
            - type: "null"
        available:
          type: boolean
        browserbaseSessionId:
          type: string
        browserbaseSessionCreateParams:
          $ref: "#/components/schemas/BrowserbaseSessionCreateParams"
        localBrowserLaunchOptions:
          $ref: "#/components/schemas/LocalBrowserLaunchOptions"
        domSettleTimeoutMs:
          type: number
        verbose:
          anyOf:
            - type: number
              const: 0
            - type: number
              const: 1
            - type: number
              const: 2
        systemPrompt:
          type: string
        selfHeal:
          type: boolean
        waitForCaptchaSolves:
          type: boolean
        experimental:
          type: boolean
        actTimeoutMs:
          type: number
      required:
        - id
        - env
        - status
        - modelName
        - available
      additionalProperties: false
    BrowserSessionResult:
      type: object
      properties:
        browserSession:
          $ref: "#/components/schemas/BrowserSession"
      required:
        - browserSession
      additionalProperties: false
    RequestId:
      example: req_01JXAMPLE
      type: string
      minLength: 1
    SessionId:
      example: session_01JXAMPLE
      type: string
      minLength: 1
    PageId:
      example: target_01JXAMPLE
      type: string
      minLength: 1
    FrameId:
      example: frame_01JXAMPLE
      type: string
      minLength: 1
    ActionId:
      example: action_01JXAMPLE
      type: string
      minLength: 1
    CDPSessionId:
      example: cdp-session_01JXAMPLE
      type: string
      minLength: 1
    Timestamp:
      example: 2026-02-03T12:00:00.000Z
      type: string
      format: date-time
      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
    MouseButton:
      type: string
      enum:
        - left
        - right
        - middle
    LoadState:
      type: string
      enum:
        - load
        - domcontentloaded
        - networkidle
    WaitForSelectorState:
      type: string
      enum:
        - attached
        - detached
        - visible
        - hidden
    ScreenshotType:
      type: string
      enum:
        - png
        - jpeg
    ScreenshotMimeType:
      type: string
      enum:
        - image/png
        - image/jpeg
    ScreenshotScale:
      type: string
      enum:
        - css
        - device
    ScreenshotAnimations:
      type: string
      enum:
        - allow
        - disabled
    ScreenshotCaret:
      type: string
      enum:
        - hide
        - initial
    PageActionMethod:
      type: string
      enum:
        - click
        - hover
        - scroll
        - dragAndDrop
        - type
        - keyPress
        - enableCursorOverlay
        - addInitScript
        - goto
        - reload
        - goBack
        - goForward
        - targetId
        - mainFrameId
        - mainFrame
        - getFullFrameTree
        - asProtocolFrameTree
        - listAllFrameIds
        - getOrdinal
        - title
        - url
        - screenshot
        - snapshot
        - frames
        - setViewportSize
        - setExtraHTTPHeaders
        - waitForLoadState
        - waitForMainLoadState
        - waitForSelector
        - waitForTimeout
        - evaluate
        - sendCDP
        - close
    PageActionStatus:
      type: string
      enum:
        - queued
        - running
        - completed
        - failed
        - canceled
    PageSelector:
      type: object
      properties:
        xpath:
          example: //button[text()='Submit']
          type: string
          minLength: 1
      required:
        - xpath
      additionalProperties: false
    PagePoint:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
      required:
        - x
        - y
      additionalProperties: false
    PageHeaders:
      type: object
      properties: {}
      additionalProperties:
        type: string
    PageInitScript:
      anyOf:
        - type: string
          minLength: 1
        - type: object
          properties:
            path:
              type: string
              minLength: 1
            content:
              type: string
              minLength: 1
          additionalProperties: false
    PageClip:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
          exclusiveMinimum: 0
        height:
          type: number
          exclusiveMinimum: 0
      required:
        - x
        - y
        - width
        - height
      additionalProperties: false
    PageError:
      type: string
      minLength: 1
    PageClickParams:
      anyOf:
        - $ref: "#/components/schemas/PageClickSelectorParams"
        - $ref: "#/components/schemas/PageClickCoordinatesParams"
    PageHoverParams:
      anyOf:
        - $ref: "#/components/schemas/PageHoverSelectorParams"
        - $ref: "#/components/schemas/PageHoverCoordinatesParams"
    PageScrollParams:
      anyOf:
        - $ref: "#/components/schemas/PageScrollSelectorParams"
        - $ref: "#/components/schemas/PageScrollCoordinatesParams"
    PageDragAndDropParams:
      anyOf:
        - $ref: "#/components/schemas/PageDragAndDropSelectorParams"
        - $ref: "#/components/schemas/PageDragAndDropCoordinatesParams"
    PageTypeParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        text:
          type: string
        delay:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        withMistakes:
          type: boolean
      required:
        - text
      additionalProperties: false
    PageKeyPressParams:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        key:
          type: string
          minLength: 1
        delay:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
