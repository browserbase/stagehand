<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stagehand</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-input: #0f3460;
      --text: #e4e4e7;
      --text-muted: #9ca3af;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --success: #10b981;
      --border: #2d2d44;
      --msg-user: #1e3a5f;
      --msg-assistant: #2d2d44;
      --btn-primary: #e94560;
      --btn-secondary: #374151;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    /* Header */
    .header {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.attached {
      background: var(--success);
    }

    .tab-info {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Settings bar */
    .settings-bar {
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .settings-bar label {
      font-size: 11px;
      color: var(--text-muted);
    }

    .settings-bar input, .settings-bar select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      flex: 1;
    }

    /* Chat messages */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 95%;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .message.user {
      background: var(--msg-user);
      align-self: flex-end;
    }

    .message.assistant {
      background: var(--msg-assistant);
      align-self: flex-start;
    }

    .message.system {
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      text-align: center;
      align-self: center;
    }

    .message .action-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--accent);
      color: white;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .message pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 8px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 11px;
      margin-top: 4px;
      white-space: pre-wrap;
    }

    .message .loading-dots::after {
      content: "";
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0% { content: "."; }
      33% { content: ".."; }
      66% { content: "..."; }
    }

    /* Action buttons */
    .action-bar {
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--btn-secondary);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
    }

    .input-area input:focus {
      border-color: var(--accent);
    }

    .input-area input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      padding: 8px 16px;
      background: var(--btn-primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .send-btn:hover {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Attach prompt */
    .attach-prompt {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      padding: 20px;
      text-align: center;
    }

    .attach-prompt button {
      padding: 10px 24px;
      background: var(--btn-primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>Stagehand</h1>
    <span class="tab-info" id="tabInfo">No tab attached</span>
  </div>

  <div class="settings-bar">
    <label for="serverHostInput">Host:</label>
    <input type="text" id="serverHostInput" placeholder="127.0.0.1" value="127.0.0.1" style="max-width: 100px;" />
    <label for="serverPortInput">Port:</label>
    <input type="number" id="serverPortInput" placeholder="3000" value="3000" style="max-width: 60px;" />
    <label for="apiKeyInput">Model API Key:</label>
    <input type="password" id="apiKeyInput" placeholder="API key" />
  </div>

  <div id="attachPrompt" class="attach-prompt" style="display: none;">
    <p>Click the Stagehand toolbar icon or the button below to attach to the active tab.</p>
    <button id="attachBtn">Attach to Active Tab</button>
  </div>

  <div id="chatSection" style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
    <div class="chat-container" id="chatContainer">
      <div class="message system">
        Stagehand ready. Select an action and enter an instruction.
      </div>
    </div>

    <div class="action-bar">
      <button class="action-btn active" data-action="agent" id="btnAgent">Agent</button>
      <button class="action-btn" data-action="act" id="btnAct">Act</button>
      <button class="action-btn" data-action="observe" id="btnObserve">Observe</button>
      <button class="action-btn" data-action="extract" id="btnExtract">Extract</button>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="promptInput"
        placeholder="Enter instruction..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
